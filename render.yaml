# Render Blueprint — deploy backend API from monorepo
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: beleqet-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/v1/jobs/stats
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: beleqet-db
          property: connectionString
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: 6379
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 30d
      - key: FRONTEND_URL
        sync: false

databases:
  - name: beleqet-db
    plan: free
    databaseName: beleqet_db
    user: beleqet_user
